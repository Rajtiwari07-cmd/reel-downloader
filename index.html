<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Downloader</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    overflow-x:hidden;
    background:#0f172a;
}

.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:linear-gradient(-45deg,#0f172a,#1e3a8a,#7c3aed,#0ea5e9);
    background-size:400% 400%;
    animation:gradient 10s ease infinite;
    z-index:-1;
}

@keyframes gradient{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.glass-card{
    width:100%;
    max-width:420px;
    padding:25px;
    border-radius:24px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
    text-align:center;
    color:white;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:15px;
}

h1{
    font-size:30px;
    font-weight:bold;
}

.theme-btn{
    width:45px;
    height:45px;
    border:none;
    border-radius:50%;
    background:#f59e0b;
    color:white;
    font-size:20px;
    cursor:pointer;
}

p{
    font-size:14px;
    opacity:0.8;
    margin-bottom:20px;
}

.input-box{
    position:relative;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:14px 110px 14px 14px;
    border:none;
    border-radius:14px;
    outline:none;
    font-size:14px;
}

.icon-buttons{
    position:absolute;
    top:50%;
    right:10px;
    transform:translateY(-50%);
    display:flex;
    gap:8px;
}

.small-btn{
    width:34px;
    height:34px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    color:white;
    font-size:16px;
    display:none;
}

#pasteBtn{
    background:#22c55e;
    display:block;
}

#resetBtn{
    background:#ef4444;
}

.main-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:linear-gradient(90deg,#c084fc,#f472b6);
    color:white;
    font-size:15px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

.main-btn:hover{
    transform:scale(1.02);
}

#msg{
    margin-top:15px;
    font-size:14px;
}

.loader{
    width:40px;
    height:40px;
    border:4px solid rgba(255,255,255,0.3);
    border-top:4px solid white;
    border-radius:50%;
    margin:10px auto;
    animation:spin 1s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.progress-box{
    width:100%;
    height:10px;
    background:rgba(255,255,255,0.2);
    border-radius:20px;
    margin-top:15px;
    overflow:hidden;
    display:none;
}

.progress-bar{
    width:0%;
    height:100%;
    background:#22c55e;
    transition:0.3s;
}

#preview{
    display:none;
    margin-top:20px;
    animation:fade 0.5s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.label{
    display:inline-block;
    padding:6px 12px;
    border-radius:20px;
    background:#c084fc;
    font-size:12px;
    font-weight:bold;
    margin-bottom:15px;
}

#thumbnail{
    width:100%;
    border-radius:16px;
    margin-bottom:15px;
    background:#111827;
    display:block;
}

#videoPreview{
    width:100%;
    border-radius:16px;
    margin-bottom:15px;
    display:none;
}

#title{
    font-size:15px;
    margin-bottom:15px;
    word-break:break-word;
}

select{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    margin-bottom:15px;
    outline:none;
}

.light-mode{
    background:#f3f4f6;
}

.light-mode .glass-card{
    background:rgba(255,255,255,0.7);
    color:black;
}

.light-mode input,
.light-mode select{
    background:white;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<div class="glass-card">

<div class="top-bar">

<h1>📥 Reel Downloader</h1>

<button class="theme-btn" id="themeBtn">
🌙
</button>

</div>

<p>Paste Instagram reel link below</p>

<div class="input-box">

<input
type="text"
id="url"
placeholder="https://www.instagram.com/reel/..."
>

<div class="icon-buttons">

<button class="small-btn" id="pasteBtn">
📋
</button>

<button class="small-btn" id="resetBtn">
↻
</button>

</div>

</div>

<button class="main-btn" id="previewBtn">
Generate Preview
</button>

<div id="msg"></div>

<div class="progress-box" id="progressBox">
<div class="progress-bar" id="progressBar"></div>
</div>

<div id="preview">

<div class="label">
🎬 REEL
</div>

<img id="thumbnail">

<video
id="videoPreview"
controls
></video>

<div id="title"></div>

<select id="quality">
<option>HD Quality</option>
<option>Medium Quality</option>
<option>Low Quality</option>
</select>

<button class="main-btn" id="downloadBtn">
⬇ Download Reel
</button>

</div>

</div>

</div>

<script>

const previewBtn =
document.getElementById("previewBtn");

const downloadBtn =
document.getElementById("downloadBtn");

const resetBtn =
document.getElementById("resetBtn");

const pasteBtn =
document.getElementById("pasteBtn");

const msg =
document.getElementById("msg");

const preview =
document.getElementById("preview");

const thumbnail =
document.getElementById("thumbnail");

const videoPreview =
document.getElementById("videoPreview");

const title =
document.getElementById("title");

const urlInput =
document.getElementById("url");

const progressBox =
document.getElementById("progressBox");

const progressBar =
document.getElementById("progressBar");

const themeBtn =
document.getElementById("themeBtn");

let currentUrl = "";

urlInput.addEventListener("input", () => {

if(urlInput.value.trim() !== ""){

resetBtn.style.display = "block";

}else{

resetBtn.style.display = "none";
}

});

pasteBtn.addEventListener("click", async () => {

try{

const text = await navigator.clipboard.readText();

urlInput.value = text;

if(text.trim() !== ""){

resetBtn.style.display = "block";
}

}catch(err){

alert("Paste failed");

}

});

function resetAll(){

urlInput.value = "";

preview.style.display = "none";

msg.innerText = "";

thumbnail.src = "";

title.innerText = "";

currentUrl = "";

videoPreview.style.display = "none";

videoPreview.src = "";

thumbnail.style.display = "block";

resetBtn.style.display = "none";

progressBox.style.display = "none";

progressBar.style.width = "0%";
}

resetBtn.addEventListener("click", resetAll);

previewBtn.addEventListener("click", async () => {

const url = urlInput.value.trim();

if(!url){

msg.innerText = "Paste Instagram link first";

return;
}

currentUrl = url;

preview.style.display = "none";

msg.innerHTML = `
<div class="loader"></div>
<p>Fetching preview...</p>
`;

previewBtn.disabled = true;

try{

const response = await fetch(
`http://localhost:3000/info?url=${encodeURIComponent(url)}`
);

const data = await response.json();

if(!data.success){

msg.innerText = "Failed to fetch preview";

previewBtn.disabled = false;

return;
}

thumbnail.src =
"https://images.weserv.nl/?url=" +
encodeURIComponent(data.thumbnail);

thumbnail.style.display = "block";

videoPreview.style.display = "none";

videoPreview.src = "";

title.innerText = data.title;

preview.style.display = "block";

msg.innerText = "Preview loaded ✔";

}catch(err){

console.error(err);

msg.innerText = "Server Error";
}

previewBtn.disabled = false;

});

downloadBtn.addEventListener("click", async () => {

msg.innerHTML = `
<div class="loader"></div>
<p>Downloading...</p>
`;

progressBox.style.display = "block";

progressBar.style.width = "0%";

let progress = 0;

const fakeProgress = setInterval(() => {

if(progress < 90){

progress += 10;

progressBar.style.width = progress + "%";
}

},300);

try{

const response = await fetch(
`http://localhost:3000/download?url=${encodeURIComponent(currentUrl)}`
);

if(!response.ok){

throw new Error("Download failed");
}

const blob = await response.blob();

clearInterval(fakeProgress);

progressBar.style.width = "100%";

const downloadUrl =
window.URL.createObjectURL(blob);

const a = document.createElement("a");

a.href = downloadUrl;

a.download = "instagram-reel.mp4";

document.body.appendChild(a);

a.click();

a.remove();

thumbnail.style.display = "none";

videoPreview.style.display = "block";

videoPreview.src = downloadUrl;

videoPreview.play();

msg.innerText = "Download complete ✔";

}catch(err){

console.error(err);

msg.innerText = "Download failed";
}

});

themeBtn.addEventListener("click", () => {

document.body.classList.toggle("light-mode");

if(document.body.classList.contains("light-mode")){

themeBtn.innerText = "☀";

}else{

themeBtn.innerText = "🌙";
}

});

</script>

</body>
</html>
